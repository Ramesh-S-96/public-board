name: Build and Deploy

on:
  push:
    branches:
      - main # Unga default branch name (main allathu master)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-with-version: '20' # Warning varakoodathu-na 20 continuous-ah vaikalam, allathu 22/24 use pannalam

      - name: Install Dependencies 🔧
        run: npm ci # allathu npm install

      - name: Build Project 🏗️
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # VITE use pannal 'dist' endru maatrunggal
          branch: gh-pages